<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA fallback redirect for project pages.
      // Keep 1 path segment (repository name) before app routes.
      const pathSegmentsToKeep = 1;
      const l = window.location;
      const basePath = l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/");
      const routePath = l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/");
      const search = l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "";

      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          basePath +
          "/?/" +
          routePath.replace(/&/g, "~and~") +
          search +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
